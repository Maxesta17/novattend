<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#800000" />
  <title>NovAttend — Sin conexion</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Montserrat', 'Segoe UI', Arial, sans-serif;
      background-color: #1a1a2e;
      color: #f0f0f0;
      min-height: 100dvh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .container {
      max-width: 430px;
      width: 100%;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.5rem;
      text-align: center;
      gap: 2rem;
    }

    .logo {
      width: 120px;
      height: 120px;
      object-fit: contain;
      opacity: 0.9;
    }

    .icon-offline {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background-color: rgba(128, 0, 0, 0.2);
      border: 2px solid #800000;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .icon-offline svg {
      width: 32px;
      height: 32px;
      stroke: #C5A059;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    h1 {
      font-family: 'Cinzel', 'Georgia', serif;
      font-size: 1.5rem;
      font-weight: 700;
      color: #C5A059;
      letter-spacing: 0.05em;
    }

    p {
      font-size: 0.95rem;
      line-height: 1.6;
      color: #b0b0b0;
      max-width: 320px;
    }

    .btn-retry {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.75rem 2rem;
      background-color: #800000;
      color: #f0f0f0;
      font-family: 'Montserrat', 'Segoe UI', Arial, sans-serif;
      font-size: 0.95rem;
      font-weight: 600;
      border: none;
      border-radius: 0.5rem;
      cursor: pointer;
      transition: background-color 0.2s ease, transform 0.1s ease;
      letter-spacing: 0.02em;
    }

    .btn-retry:hover {
      background-color: #990000;
    }

    .btn-retry:active {
      transform: scale(0.97);
    }

    .btn-retry svg {
      width: 18px;
      height: 18px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .divider {
      width: 60px;
      height: 2px;
      background: linear-gradient(90deg, transparent, #C5A059, transparent);
    }
  </style>
</head>
<body>
  <div class="container">
    <img src="/logova1.png" alt="NovAttend" class="logo" />

    <div class="icon-offline">
      <svg viewBox="0 0 24 24">
        <line x1="1" y1="1" x2="23" y2="23" />
        <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55" />
        <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39" />
        <path d="M10.71 5.05A16 16 0 0 1 22.56 9" />
        <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88" />
        <path d="M8.53 16.11a6 6 0 0 1 6.95 0" />
        <line x1="12" y1="20" x2="12.01" y2="20" />
      </svg>
    </div>

    <h1>Sin conexion</h1>

    <div class="divider"></div>

    <p>
      Revisa tu conexion a internet e intentalo de nuevo.
      Tus datos guardados estaran disponibles cuando vuelvas a conectarte.
    </p>

    <button class="btn-retry" onclick="window.location.reload()">
      <svg viewBox="0 0 24 24">
        <polyline points="23 4 23 10 17 10" />
        <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10" />
      </svg>
      Reintentar
    </button>
  </div>
</body>
</html>
